// GAME ENGINE
// ============================================================
let state;
let gameAborted = false;
let gameId = 0; // increments on restart to invalidate old async loops
let persistentWallets = null; // carries across games; null = first game ever

function checkAbort(id) {
  if (gameAborted || id !== gameId) throw new Error('GAME_ABORTED');
}

function restartGame() {
  gameAborted = true;
  gameId++;
  // Clear overlay
  $('.message-overlay').classList.remove('message-overlay--visible');
  netDisconnect();
  setTimeout(() => {
    gameAborted = false;
    gameMode = 'ai';
    playerRole = null;
    roomCode = null;
    onlineConfig = null;
    $('.config-bar').style.display = '';
    showModeSelect();
  }, 50);
}

function createState() {
  return {
    phase:'GAME_START',
    scores:{player:0,ai:0},
    driveNumber:0, totalDrives:4,
    drive: { offenseSide:'player', yardLine:20, downNumber:1, yardsGainedThisSet:0, yardsNeededForFirstDown:10, hasFirstDown:false },
    down: { offenseHand:[], defenseHand:[], offensePlacements:{wr1:null,rb:null,wr2:null}, defensePlacements:{cb1:null,db:null,cb2:null}, rockPosition:null, offenseDice:null, defenseDice:null, result:null },
    deck:[], discardPile:[], isOvertime:false, overtimeRound:0,
    wallets:{player:100, ai:100},
    buyIn:10,
    startingBalance:100,
    pot:0,
    bets:{ positions:[], defenseBets:{}, offenseResponses:{}, raiseAmounts:{}, defenseMatched:{}, results:{} },
  };
}

function resetDrive(s) {
  s.drive.yardLine=20; s.drive.downNumber=1; s.drive.yardsGainedThisSet=0;
  s.drive.yardsNeededForFirstDown=10; s.drive.hasFirstDown=false;
}

function resetDown(s) {
  s.down.offensePlacements={wr1:null,rb:null,wr2:null};
  s.down.defensePlacements={cb1:null,db:null,cb2:null};
  s.down.rockPosition=null; s.down.offenseDice=null; s.down.defenseDice=null; s.down.result=null;
  s.bets={ positions:[], defenseBets:{}, offenseResponses:{}, raiseAmounts:{}, defenseMatched:{}, offenseBets:{}, offInitDefResponses:{}, offInitDefRaises:{}, offInitOffMatched:{}, results:{} };
}

function ensureDeck(s, n) {
  if (s.deck.length < n) {
    s.deck.push(...s.discardPile); s.discardPile=[];
    s.deck = shuffleDeck(s.deck);
  }
}

async function executeDown(state, offCards, defCards, myId) {
  const offSideDrive = state.drive.offenseSide;
  const pIsOff = isLocalSide(offSideDrive);
  hideResult(); hideDiceArea(); renderGameInfo(state);

  if (isOnline()) {
    // === ONLINE MODE ===
    if (pIsOff) {
      // Local player is offense
      state.phase='OFFENSE_PLACE_CARDS';
      setInstruction(`Place 3 of your ${offCards.length} cards on the field (tap card, then tap position)`);
      state.down.offensePlacements={wr1:null,rb:null,wr2:null};
      renderField(state);
      renderHand(offCards, state);
      await waitForPlacement(state, offCards);
      checkAbort(myId);

      state.phase='PLACE_ROCK';
      setInstruction('Place the rock: tap RB (Run) or a WR (Pass)');
      await waitForRock(state);
      checkAbort(myId);

      // Send placement + rock to opponent (card values hidden until reveal)
      netSend({ type: 'OFFENSE_DONE', data: {
        placements: { wr1: state.down.offensePlacements.wr1, rb: state.down.offensePlacements.rb, wr2: state.down.offensePlacements.wr2 },
        rock: state.down.rockPosition
      }});

      // Wait for opponent defense placement
      state.phase='DEFENSE_PLACE_CARDS';
      setInstruction('Waiting for opponent to place defense...');
      renderHand([], state);
      const defMsg = await waitForNetMessage();
      checkAbort(myId);
      state.down.defensePlacements = defMsg.data.placements;
    } else {
      // Local player is defense — wait for opponent offense + rock
      state.phase='OFFENSE_PLACE_CARDS';
      setInstruction('Waiting for opponent to place offense...');
      state.down.offensePlacements={wr1:null,rb:null,wr2:null};
      renderField(state);
      renderHand([], state);
      const offMsg = await waitForNetMessage();
      checkAbort(myId);
      state.down.offensePlacements = offMsg.data.placements;
      state.down.rockPosition = offMsg.data.rock;
      renderField(state);

      // Local player places defense
      state.phase='DEFENSE_PLACE_CARDS';
      setInstruction(`Place 3 of your ${defCards.length} cards on defense (tap card, then tap position)`);
      state.down.defensePlacements={cb1:null,db:null,cb2:null};
      renderField(state);
      renderHand(defCards, state);
      await waitForPlacement(state, defCards);
      checkAbort(myId);

      // Send defense placement to opponent
      netSend({ type: 'DEFENSE_DONE', data: {
        placements: { cb1: state.down.defensePlacements.cb1, db: state.down.defensePlacements.db, cb2: state.down.defensePlacements.cb2 }
      }});
    }
  } else if (pIsOff) {
    // === AI MODE: Player on offense ===
    state.phase='OFFENSE_PLACE_CARDS';
    setInstruction(`Place 3 of your ${offCards.length} cards on the field (tap card, then tap position)`);
    state.down.offensePlacements={wr1:null,rb:null,wr2:null};
    renderField(state);
    renderHand(offCards, state);
    await waitForPlacement(state, offCards);
    checkAbort(myId);

    state.phase='PLACE_ROCK';
    setInstruction('Place the rock: tap RB (Run) or a WR (Pass)');
    await waitForRock(state);
    checkAbort(myId);

    state.phase='DEFENSE_PLACE_CARDS';
    setInstruction('Defense is setting up...');
    renderHand([], state);
    await sleep(600);
    checkAbort(myId);
    state.down.defensePlacements = aiPlaceDefense(defCards);
  } else {
    // === AI MODE: AI on offense ===
    state.phase='OFFENSE_PLACE_CARDS';
    setInstruction('AI is setting up their offense...');
    state.down.offensePlacements={wr1:null,rb:null,wr2:null};
    renderField(state);
    await sleep(600);
    checkAbort(myId);
    const aiOff = aiPlaceOffense(offCards);
    state.down.offensePlacements = aiOff.placements;
    state.down.rockPosition = aiOff.rockPosition;
    renderField(state);

    state.phase='DEFENSE_PLACE_CARDS';
    setInstruction(`Place 3 of your ${defCards.length} cards on defense (tap card, then tap position)`);
    state.down.defensePlacements={cb1:null,db:null,cb2:null};
    renderField(state);
    renderHand(defCards, state);
    await waitForPlacement(state, defCards);
    checkAbort(myId);
  }

  // === BETTING SEQUENCE ===
  const nonRockPos = getNonRockPositions(state.down.rockPosition);
  state.bets.positions = nonRockPos;

  const offSide = state.drive.offenseSide;
  const defSide = getDefenseSide(state);
  const canBet = state.wallets[offSide] > 0 || state.wallets[defSide] > 0;

  if (canBet) {
    const localIsDef = isLocalSide(defSide);
    const localIsOff = isLocalSide(offSide);
    const oppLabel = isOnline() ? 'Opponent' : 'AI';

    // ---- ROUND 1: Defense bets first ----
    state.phase = 'DEFENSE_BET';
    renderField(state);
    if (defSide === 'ai' && !isOnline()) {
      setInstruction('AI defense is placing side bets...');
      await sleep(600);
      checkAbort(myId);
      state.bets.defenseBets = aiBetAsDefense(state);
      renderField(state);
      const betSummary = nonRockPos.map(p => `${posLabel(p)}: $${state.bets.defenseBets[p]}`).join(', ');
      if (nonRockPos.some(p => state.bets.defenseBets[p] > 0)) {
        await showMessage('AI Side Bets', `Defense bets: ${betSummary}`, 'Respond');
        checkAbort(myId);
      }
    } else if (localIsDef) {
      setInstruction('Place your defense side bets on the non-rock cards');
      renderHand([], state);
      await waitForDefenseBet(state);
      checkAbort(myId);
      renderField(state);
      if (isOnline()) netSend({ type: 'DEFENSE_BETS', data: state.bets.defenseBets });
    } else {
      // Remote player is defense — wait for their bets
      setInstruction(`Waiting for ${oppLabel} to place defense bets...`);
      renderHand([], state);
      const msg = await waitForNetMessage();
      checkAbort(myId);
      state.bets.defenseBets = msg.data;
      renderField(state);
      const betSummary = nonRockPos.map(p => `${posLabel(p)}: $${state.bets.defenseBets[p]}`).join(', ');
      if (nonRockPos.some(p => state.bets.defenseBets[p] > 0)) {
        await showMessage(`${oppLabel} Side Bets`, `Defense bets: ${betSummary}`, 'Respond');
        checkAbort(myId);
      }
    }

    // Positions where defense bet vs didn't
    const defBetPositions = nonRockPos.filter(p => (state.bets.defenseBets[p] || 0) > 0);
    const unbetPositions = nonRockPos.filter(p => (state.bets.defenseBets[p] || 0) === 0);

    // ---- ROUND 1b: Offense responds to defense bets ----
    nonRockPos.forEach(p => { state.bets.offenseResponses[p] = 'pass'; state.bets.raiseAmounts[p] = 0; });
    if (defBetPositions.length > 0) {
      state.phase = 'OFFENSE_RESPOND';
      if (offSide === 'ai' && !isOnline()) {
        const aiResp = aiBetAsOffenseResponse(state);
        state.bets.offenseResponses = aiResp.responses;
        state.bets.raiseAmounts = aiResp.raises;
        const anyAction = defBetPositions.some(p => aiResp.responses[p] !== 'pass');
        if (anyAction) {
          setInstruction('AI offense is responding...');
          await sleep(600);
          checkAbort(myId);
          const respSummary = defBetPositions
            .map(p => `${posLabel(p)}: ${aiResp.responses[p]}${aiResp.responses[p]==='raise'?' $'+aiResp.raises[p]:''}`).join(', ');
          await showMessage('AI Response', respSummary, 'Continue');
          checkAbort(myId);
        }
        renderField(state);
      } else if (localIsOff) {
        setInstruction('Respond to defense side bets');
        renderHand([], state);
        await waitForOffenseResponse(state);
        checkAbort(myId);
        renderField(state);
        if (isOnline()) netSend({ type: 'OFFENSE_RESPONSES', data: { responses: state.bets.offenseResponses, raises: state.bets.raiseAmounts } });
      } else {
        setInstruction(`Waiting for ${oppLabel} to respond...`);
        const msg = await waitForNetMessage();
        checkAbort(myId);
        state.bets.offenseResponses = msg.data.responses;
        state.bets.raiseAmounts = msg.data.raises;
        renderField(state);
        const anyAction = defBetPositions.some(p => msg.data.responses[p] !== 'pass');
        if (anyAction) {
          const respSummary = defBetPositions
            .map(p => `${posLabel(p)}: ${msg.data.responses[p]}${msg.data.responses[p]==='raise'?' $'+msg.data.raises[p]:''}`).join(', ');
          await showMessage(`${oppLabel} Response`, respSummary, 'Continue');
          checkAbort(myId);
        }
      }

      // Defense matches raises if any
      const hasRaises = defBetPositions.some(p => state.bets.offenseResponses[p] === 'raise');
      if (hasRaises) {
        state.phase = 'DEFENSE_MATCH';
        if (defSide === 'ai' && !isOnline()) {
          state.bets.defenseMatched = aiBetDefenseMatch(state);
          const matchSummary = defBetPositions.filter(p => state.bets.offenseResponses[p]==='raise')
            .map(p => `${posLabel(p)}: ${state.bets.defenseMatched[p]?'matched':'passed'}`).join(', ');
          setInstruction('AI defense deciding on raises...');
          await sleep(600);
          checkAbort(myId);
          await showMessage('AI Match Decision', matchSummary, 'Continue');
          checkAbort(myId);
        } else if (localIsDef) {
          setInstruction('Offense raised! Match or pass?');
          renderHand([], state);
          await waitForDefenseMatch(state);
          checkAbort(myId);
          if (isOnline()) netSend({ type: 'DEFENSE_MATCHED', data: state.bets.defenseMatched });
        } else {
          setInstruction(`Waiting for ${oppLabel} to decide on raises...`);
          const msg = await waitForNetMessage();
          checkAbort(myId);
          state.bets.defenseMatched = msg.data;
          const matchSummary = defBetPositions.filter(p => state.bets.offenseResponses[p]==='raise')
            .map(p => `${posLabel(p)}: ${msg.data[p]?'matched':'passed'}`).join(', ');
          await showMessage(`${oppLabel} Match Decision`, matchSummary, 'Continue');
          checkAbort(myId);
        }
      }
    }

    // ---- ROUND 2: Offense initiates bets on positions defense passed on ----
    if (unbetPositions.length > 0 && state.wallets[offSide] > 0) {
      state.phase = 'OFFENSE_BET';
      if (offSide === 'ai' && !isOnline()) {
        state.bets.offenseBets = aiBetAsOffenseInitiate(state, unbetPositions);
        renderField(state);
        const anyOffBets = unbetPositions.some(p => (state.bets.offenseBets[p] || 0) > 0);
        if (anyOffBets) {
          const betSummary = unbetPositions.map(p => `${posLabel(p)}: $${state.bets.offenseBets[p]}`).join(', ');
          setInstruction('AI offense is placing bets...');
          await sleep(600);
          checkAbort(myId);
          await showMessage('AI Offense Bets', `Offense bets: ${betSummary}`, 'Respond');
          checkAbort(myId);
        }
      } else if (localIsOff) {
        setInstruction('Defense passed — place your offense bets');
        renderHand([], state);
        await waitForOffenseInitiateBet(state, unbetPositions);
        checkAbort(myId);
        renderField(state);
        if (isOnline()) netSend({ type: 'OFFENSE_BETS', data: state.bets.offenseBets });
      } else {
        setInstruction(`Waiting for ${oppLabel} to place offense bets...`);
        const msg = await waitForNetMessage();
        checkAbort(myId);
        state.bets.offenseBets = msg.data;
        renderField(state);
        const anyOffBets = unbetPositions.some(p => (msg.data[p] || 0) > 0);
        if (anyOffBets) {
          const betSummary = unbetPositions.map(p => `${posLabel(p)}: $${msg.data[p]}`).join(', ');
          await showMessage(`${oppLabel} Offense Bets`, `Offense bets: ${betSummary}`, 'Respond');
          checkAbort(myId);
        }
      }

      // Defense responds to offense-initiated bets
      const offBetPositions = unbetPositions.filter(p => (state.bets.offenseBets[p] || 0) > 0);
      if (offBetPositions.length > 0) {
        state.phase = 'DEFENSE_RESPOND_OFF';
        if (defSide === 'ai' && !isOnline()) {
          const aiResp = aiBetDefenseRespond(state, state.bets.offenseBets);
          state.bets.offInitDefResponses = aiResp.responses;
          state.bets.offInitDefRaises = aiResp.raises;
          const anyAction = offBetPositions.some(p => aiResp.responses[p] !== 'pass');
          if (anyAction) {
            setInstruction('AI defense is responding...');
            await sleep(600);
            checkAbort(myId);
            const respSummary = offBetPositions
              .map(p => `${posLabel(p)}: ${aiResp.responses[p]}${aiResp.responses[p]==='raise'?' $'+aiResp.raises[p]:''}`).join(', ');
            await showMessage('AI Defense Response', respSummary, 'Continue');
            checkAbort(myId);
          }
          renderField(state);
        } else if (localIsDef) {
          setInstruction('Respond to offense side bets');
          renderHand([], state);
          await waitForDefenseRespondToOffBet(state);
          checkAbort(myId);
          renderField(state);
          if (isOnline()) netSend({ type: 'DEF_RESPOND_OFF', data: { responses: state.bets.offInitDefResponses, raises: state.bets.offInitDefRaises } });
        } else {
          setInstruction(`Waiting for ${oppLabel} to respond...`);
          const msg = await waitForNetMessage();
          checkAbort(myId);
          state.bets.offInitDefResponses = msg.data.responses;
          state.bets.offInitDefRaises = msg.data.raises;
          renderField(state);
          const anyAction = offBetPositions.some(p => msg.data.responses[p] !== 'pass');
          if (anyAction) {
            const respSummary = offBetPositions
              .map(p => `${posLabel(p)}: ${msg.data.responses[p]}${msg.data.responses[p]==='raise'?' $'+msg.data.raises[p]:''}`).join(', ');
            await showMessage(`${oppLabel} Defense Response`, respSummary, 'Continue');
            checkAbort(myId);
          }
        }

        // Offense matches defense raises on offense-initiated bets
        const hasOffRaises = offBetPositions.some(p => (state.bets.offInitDefResponses[p]) === 'raise');
        if (hasOffRaises) {
          state.phase = 'OFFENSE_MATCH_DEF';
          if (offSide === 'ai' && !isOnline()) {
            state.bets.offInitOffMatched = aiBetOffenseMatchRaise(state);
            const matchSummary = offBetPositions.filter(p => state.bets.offInitDefResponses[p]==='raise')
              .map(p => `${posLabel(p)}: ${state.bets.offInitOffMatched[p]?'matched':'passed'}`).join(', ');
            setInstruction('AI offense deciding on raises...');
            await sleep(600);
            checkAbort(myId);
            await showMessage('AI Match Decision', matchSummary, 'Continue');
            checkAbort(myId);
          } else if (localIsOff) {
            setInstruction('Defense raised! Match or pass?');
            renderHand([], state);
            await waitForOffenseMatchDefRaise(state);
            checkAbort(myId);
            if (isOnline()) netSend({ type: 'OFFENSE_MATCHED', data: state.bets.offInitOffMatched });
          } else {
            setInstruction(`Waiting for ${oppLabel} to decide on raises...`);
            const msg = await waitForNetMessage();
            checkAbort(myId);
            state.bets.offInitOffMatched = msg.data;
            const matchSummary = offBetPositions.filter(p => state.bets.offInitDefResponses[p]==='raise')
              .map(p => `${posLabel(p)}: ${msg.data[p]?'matched':'passed'}`).join(', ');
            await showMessage(`${oppLabel} Match Decision`, matchSummary, 'Continue');
            checkAbort(myId);
          }
        }
      }
    }
  }
  // === END BETTING SEQUENCE ===

  state.phase='REVEAL';
  setInstruction('Revealing cards...');
  renderField(state);
  await revealAllCards();
  checkAbort(myId);

  const isPass = state.down.rockPosition==='wr1'||state.down.rockPosition==='wr2';
  let oD=null, dD=null;

  if (isPass) {
    state.phase='DICE_ROLL';
    setInstruction('Rolling the dice...');
    if (isOnline()) {
      // Host rolls dice, sends to guest
      if (playerRole === 'host') {
        oD=rollDice(); dD=rollDice();
        netSend({ type: 'DICE', data: { offense: oD, defense: dD } });
      } else {
        const diceMsg = await waitForNetMessage();
        checkAbort(myId);
        oD = diceMsg.data.offense; dD = diceMsg.data.defense;
      }
    } else {
      oD=rollDice(); dD=rollDice();
    }
    state.down.offenseDice=oD; state.down.defenseDice=dD;
    await renderDiceRoll(oD, dD);
    checkAbort(myId);
  }

  state.phase='RESOLVE_DOWN';
  const result = resolveDown(state.down.offensePlacements, state.down.defensePlacements, state.down.rockPosition, oD, dD);
  state.down.result = result;

  const sign=result.yards>=0?'+':'';
  const type=result.yards>0?'positive':result.yards<0?'negative':'neutral';
  showResult(`${sign}${result.yards} yards | ${result.breakdown}`, type);

  // Resolve side bets after down result
  if (canBet) {
    resolveBets(state);
    persistentWallets = { player: state.wallets.player, ai: state.wallets.ai };
    renderWallets(state);
    await showBetResults(state);
    checkAbort(myId);
  }

  setInstruction('');
  await waitForNext();
  checkAbort(myId);
  hideDiceArea();
  return result;
}

async function executePossession(state, offenseSide, myId) {
  state.drive.offenseSide = offenseSide;
  resetDrive(state);

  const offLabel = sideLabel(offenseSide);
  const scoreKey = offenseSide;
  await showMessage(`${offLabel} on Offense`, `Starting at the 20 yard line. Get 10 yards in 3 downs for a first down!`, 'Start');
  checkAbort(myId);

  let possessionOver = false;

  while (!possessionOver) {
    // Deal 9 cards to each side for this set of downs
    let offCards, defCards;
    if (isOnline()) {
      if (playerRole === 'host') {
        ensureDeck(state, 18);
        offCards = dealCards(state.deck, 9);
        defCards = dealCards(state.deck, 9);
        // Send both hands to guest (guest gets the opposite perspective)
        netSend({ type: 'DEAL', data: { offCards, defCards } });
      } else {
        const dealMsg = await waitForNetMessage();
        checkAbort(myId);
        offCards = dealMsg.data.offCards;
        defCards = dealMsg.data.defCards;
      }
    } else {
      ensureDeck(state, 18);
      offCards = dealCards(state.deck, 9);
      defCards = dealCards(state.deck, 9);
    }

    // Play 3 downs — players see full hand and pick 3 cards each down
    for (let dn=1; dn<=3; dn++) {
      state.drive.downNumber = dn;
      resetDown(state);
      const result = await executeDown(state, offCards, defCards, myId);

      // Apply yards (can be negative if defense wins the matchup)
      state.drive.yardsGainedThisSet += result.yards;
      state.drive.yardLine = Math.max(0, state.drive.yardLine - result.yards);

      // Discard
      state.discardPile.push(...Object.values(state.down.offensePlacements).filter(Boolean));
      state.discardPile.push(...Object.values(state.down.defensePlacements).filter(Boolean));

      if (state.drive.yardLine <= 0) {
        state.drive.yardLine = 0;
        state.scores[scoreKey] += 7;
        renderScoreboard(state);
        await showMessage('TOUCHDOWN!', `${offLabel} scored! +7 points`);
        checkAbort(myId);
        possessionOver = true; break;
      }

      // Check first down after each down — don't wait until all 3 are played
      if (state.drive.yardsGainedThisSet >= state.drive.yardsNeededForFirstDown) {
        state.drive.hasFirstDown = true;
        await showMessage('First Down!', `Advanced to the ${state.drive.yardLine} yard line! New set of downs.`);
        checkAbort(myId);
        state.drive.yardsGainedThisSet = 0;
        state.drive.yardsNeededForFirstDown = state.drive.yardLine;
        break;
      }
    }

    if (possessionOver) break;

    if (state.drive.hasFirstDown) {
      state.drive.hasFirstDown = false;
      state.drive.downNumber = 1;
      continue;
    }

    // Failed 3 downs — 4th down decision
    let decision;
    if (state.isOvertime) {
      decision = 'go';
      const otLabel = isLocalSide(offenseSide) ? 'You must' : `${offLabel} must`;
      await showMessage('4th Down - Overtime',`No field goals in overtime! ${otLabel} go for it!`);
      checkAbort(myId);
    } else if (isOnline()) {
      // Online: local offense player chooses, remote waits
      if (isLocalSide(offenseSide)) {
        decision = await showFourthDownChoice();
        checkAbort(myId);
        netSend({ type: 'FOURTH_DOWN', data: { decision } });
      } else {
        setInstruction('Waiting for opponent\'s 4th down decision...');
        const fdMsg = await waitForNetMessage();
        checkAbort(myId);
        decision = fdMsg.data.decision;
        await showMessage('4th Down',`Opponent chose to ${decision==='fg'?'kick a Field Goal':'go for it'}!`);
        checkAbort(myId);
      }
    } else if (offenseSide==='player') {
      decision = await showFourthDownChoice();
      checkAbort(myId);
    } else {
      decision = aiFourthDownDecision(state.drive.yardLine, state.scores.ai, state.scores.player);
      await showMessage('4th Down',`AI chose to ${decision==='fg'?'kick a Field Goal':'go for it'}!`);
      checkAbort(myId);
    }

    if (decision==='fg') {
      state.scores[scoreKey] += 3;
      renderScoreboard(state);
      await showMessage('Field Goal!',`${offLabel} scored 3 points!`);
      checkAbort(myId);
      possessionOver = true;
    } else {
      // 4th down: deal 3 new cards each
      let o4, d4;
      if (isOnline()) {
        if (playerRole === 'host') {
          ensureDeck(state, 6);
          o4 = dealCards(state.deck, 3); d4 = dealCards(state.deck, 3);
          netSend({ type: 'DEAL', data: { offCards: o4, defCards: d4 } });
        } else {
          const dealMsg = await waitForNetMessage();
          checkAbort(myId);
          o4 = dealMsg.data.offCards; d4 = dealMsg.data.defCards;
        }
      } else {
        ensureDeck(state, 6);
        o4 = dealCards(state.deck, 3); d4 = dealCards(state.deck, 3);
      }
      resetDown(state);
      state.drive.downNumber = 4;
      const result = await executeDown(state, o4, d4, myId);

      state.drive.yardLine = Math.max(0, state.drive.yardLine - result.yards);

      const yardsGained4th = state.drive.yardsGainedThisSet + result.yards;
      if (yardsGained4th >= state.drive.yardsNeededForFirstDown && state.drive.yardLine > 0) {
        await showMessage('First Down!','Converted on 4th down!');
        checkAbort(myId);
        state.drive.yardsGainedThisSet=0;
        state.drive.yardsNeededForFirstDown=state.drive.yardLine;
        state.drive.hasFirstDown=true;
        continue;
      }

      state.discardPile.push(...Object.values(state.down.offensePlacements).filter(Boolean));
      state.discardPile.push(...Object.values(state.down.defensePlacements).filter(Boolean));

      if (state.drive.yardLine<=0) {
        state.drive.yardLine=0;
        state.scores[scoreKey]+=7;
        renderScoreboard(state);
        await showMessage('TOUCHDOWN!',`${offLabel} scored on 4th down! +7 points`);
        checkAbort(myId);
      } else {
        await showMessage('Turnover on Downs','Failed to convert. Possession over.');
        checkAbort(myId);
      }
      possessionOver=true;
    }
  }
}

async function executeOvertimePossession(state, offenseSide, myId) {
  state.drive.offenseSide = offenseSide;
  state.drive.yardLine = 5;
  state.drive.downNumber = 1;
  state.drive.yardsGainedThisSet = 0;
  state.drive.yardsNeededForFirstDown = 5;
  state.drive.hasFirstDown = true; // Always "& Goal" in OT

  const offLabel = sideLabel(offenseSide);
  const scoreKey = offenseSide;
  await showMessage(`OT — ${offLabel} on Offense`, '3 downs from the 5 yard line. 9 cards. Score to win!', 'Go');
  checkAbort(myId);

  // Deal 9 cards each for 3 downs
  let offCards, defCards;
  if (isOnline()) {
    if (playerRole === 'host') {
      ensureDeck(state, 18);
      offCards = dealCards(state.deck, 9);
      defCards = dealCards(state.deck, 9);
      netSend({ type: 'DEAL', data: { offCards, defCards } });
    } else {
      const dealMsg = await waitForNetMessage();
      checkAbort(myId);
      offCards = dealMsg.data.offCards;
      defCards = dealMsg.data.defCards;
    }
  } else {
    ensureDeck(state, 18);
    offCards = dealCards(state.deck, 9);
    defCards = dealCards(state.deck, 9);
  }

  let scored = false;

  for (let dn = 1; dn <= 3; dn++) {
    state.drive.downNumber = dn;
    resetDown(state);
    renderGameInfo(state);

    const result = await executeDown(state, offCards, defCards, myId);

    state.drive.yardsGainedThisSet += result.yards;
    state.drive.yardLine = Math.max(0, state.drive.yardLine - result.yards);

    state.discardPile.push(...Object.values(state.down.offensePlacements).filter(Boolean));
    state.discardPile.push(...Object.values(state.down.defensePlacements).filter(Boolean));

    if (state.drive.yardLine <= 0) {
      state.drive.yardLine = 0;
      state.scores[scoreKey] += 7;
      renderScoreboard(state);
      await showMessage('TOUCHDOWN!', `${offLabel} scored in overtime! +7 points`);
      checkAbort(myId);
      scored = true;
      break;
    }
  }

  if (!scored) {
    await showMessage('No Score', `${offLabel} failed to reach the end zone. ${state.drive.yardLine} yards short.`);
    checkAbort(myId);
  }
}

async function startGame() {
  const myId = gameId;
  state = createState();
  state.deck = shuffleDeck(createDeck());
  // Update labels for game mode
  const oppLabel = gameMode === 'online' ? 'Opponent' : 'AI';
  $$('.scoreboard__label')[1].textContent = oppLabel;
  $('.wallet--ai .wallet__label').textContent = oppLabel + ' Credits';
  renderScoreboard(state);
  renderGameInfo(state);
  hideResult(); hideDiceArea(); hideBettingPanel();
  renderHand([], state);
  // Show carried-over balance if exists
  if (persistentWallets) {
    state.wallets.player = persistentWallets.player;
    state.wallets.ai = persistentWallets.ai;
  }
  renderWallets(state);

  try {
    const oppLabel = sideLabel('ai');

    if (isOnline()) {
      // Online: config was set in lobby, apply it directly
      $('.config-bar').style.display = 'none';
      if (onlineConfig) {
        state.buyIn = onlineConfig.buyIn;
        state.startingBalance = onlineConfig.startingBalance;
      }
      if (persistentWallets === null) {
        state.wallets.player = state.startingBalance;
        state.wallets.ai = state.startingBalance;
      } else {
        state.wallets.player = persistentWallets.player;
        state.wallets.ai = persistentWallets.ai;
      }
      state.wallets.player -= state.buyIn;
      state.wallets.ai -= state.buyIn;
      state.pot = state.buyIn * 2;
      renderWallets(state);
    } else {
      // AI mode: local player sets config
      unlockConfig();
      const contMsg = persistentWallets ? ` (You: $${persistentWallets.player} | ${oppLabel}: $${persistentWallets.ai})` : '';
      setInstruction('Set your bets!' + contMsg);
      setActionBtn('Set your bets!', false, null);
      await waitForConfig();
      checkAbort(myId);
    }

    await showMessage('Ball Crap',`Football meets Craps! Buy-in: $${state.buyIn}. Pot: $${state.pot}. Winner takes all!`,'Let\'s Go!');
    checkAbort(myId);

    // Always 'player' first offense, 'ai' second — in online mode host='player', guest='ai'
    state.driveNumber = 1;
    await executePossession(state, 'player', myId);
    checkAbort(myId);

    await showMessage('Switching Sides!',`Score: You ${state.scores.player} - ${oppLabel} ${state.scores.ai}. Now ${oppLabel} goes on offense!`,'Continue');
    checkAbort(myId);

    state.driveNumber = 2;
    await executePossession(state, 'ai', myId);
    checkAbort(myId);

    // Check tie → overtime
    if (state.scores.player===state.scores.ai) {
      state.isOvertime=true;
      while (state.scores.player===state.scores.ai) {
        state.overtimeRound++;
        state.deck=shuffleDeck(createDeck()); state.discardPile=[];
        await showMessage('Overtime!',`Round ${state.overtimeRound} — 3 downs each, 5 yard line, 9 cards. Score to win!`,'Start OT');
        checkAbort(myId);

        const scoreBefore = { player: state.scores.player, ai: state.scores.ai };

        await executeOvertimePossession(state, 'player', myId);
        checkAbort(myId);

        const firstScored = state.scores.player > scoreBefore.player || state.scores.ai > scoreBefore.ai;
        if (firstScored) {
          await showMessage(`${oppLabel} Must Answer!`, `You scored! ${oppLabel} gets a chance to match.`, 'Continue');
          checkAbort(myId);
        }

        await executeOvertimePossession(state, 'ai', myId);
        checkAbort(myId);
      }
    }

    const winnerSide = state.scores.player>state.scores.ai ? 'player' : 'ai';
    const winnerLabel = isLocalSide(winnerSide) ? 'You Win!' : `${oppLabel} Wins!`;
    state.wallets[winnerSide] += state.pot;
    state.pot = 0;
    persistentWallets = { player: state.wallets.player, ai: state.wallets.ai };
    renderWallets(state);
    await showMessage('Game Over!',`${winnerLabel} Final: You ${state.scores.player} - ${oppLabel} ${state.scores.ai}. Pot ($${state.buyIn * 2}) awarded!`,'Play Again');
    if (isOnline()) {
      netDisconnect();
      showModeSelect();
    } else {
      startGame();
    }

  } catch(e) {
    if (e.message !== 'GAME_ABORTED') throw e;
    // Silently stop — restartGame() will call startGame() again
  }
}

document.addEventListener('DOMContentLoaded', () => {
  window.DEBUG_STATE = () => state;
  // Show mode selection screen instead of auto-starting
  showModeSelect();
});
</script>
